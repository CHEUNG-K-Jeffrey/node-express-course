<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button id="getAllProducts">
        Get All Products!
    </button>
    <div id="products">

    </div>
    <script>
        const button = document.querySelector("#getAllProducts");
        document.addEventListener("click", async () => {
            const productsData = await fetch("/api/v1/products")
                .then((res) => res.text());
            const products = document.querySelector("#products");
            products.append(productsData);
        });
    </script>
</body>

</html>
